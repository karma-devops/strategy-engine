<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULS-R Strategy Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <div class="logo">
                    <span class="logo-text">PULS<span class="logo-accent">·</span>R</span>
                </div>
                <span class="status-pill" id="global-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Ready</span>
                </span>
            </div>
            <div class="topbar-right">
                <span class="clock" id="clock">--:--:--</span>
                <button class="btn-icon" onclick="refreshAll()" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                </button>
                <a href="/withdrawals" class="btn-icon" title="Withdrawals">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 6l-5-5-5 5M17 18l-5 5-5-5"/></svg>
                </a>
                <a href="/instances/new" class="btn-icon btn-icon-accent" title="Add Engine">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </a>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat">
                <span class="stat-label">Account Value</span>
                <div class="stat-value-row">
                    <span class="stat-value" id="stat-account">-</span>
                    <span class="stat-unit">USDC</span>
                </div>
            </div>
            <div class="stat">
                <span class="stat-label">Drawdown</span>
                <div class="stat-value-row">
                    <span class="stat-value" id="stat-drawdown">-</span>
                    <span class="stat-unit">30D</span>
                </div>
            </div>
            <div class="stat">
                <span class="stat-label">Active Engines</span>
                <div class="stat-value-row">
                    <span class="stat-value" id="stat-active">-</span>
                    <span class="stat-unit">Running</span>
                </div>
            </div>
            <div class="stat">
                <span class="stat-label">Open PnL</span>
                <div class="stat-value-row">
                    <span class="stat-value" id="stat-pnl">-</span>
                    <span class="stat-unit">Unrealized</span>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main">
            <!-- Left: Graph + Fleet -->
            <div class="left-panel">
                <div class="card">
                    <div class="card-head">
                        <h2>Equity Curve</h2>
                        <span class="tag tag-neutral" id="pulse-range">30D</span>
                    </div>
                    <div id="pulse-canvas" class="chart-area"></div>
                </div>

                <div class="card">
                    <div class="card-head">
                        <h2>Fleet <span class="tag tag-neutral" id="fleet-count">0</span></h2>
                        <button class="btn-sm fleet-toggle" onclick="toggleFleet()" id="fleet-toggle-btn">Collapse</button>
                    </div>
                    <div id="instances-grid" class="fleet-grid">
                        <div class="empty">Loading engines...</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-head">
                        <h2>Trade History</h2>
                        <span class="tag tag-neutral" id="trade-count">0</span>
                    </div>
                    <div id="trade-history" class="trade-list">
                        <div class="empty">No trades yet.</div>
                    </div>
                </div>
            </div>

            <!-- Right: Engine Detail -->
            <div class="right-panel">
                <div class="card detail-card">
                    <div class="card-head">
                        <h2 id="detail-title">Engine Detail</h2>
                        <div class="card-actions" id="detail-actions"></div>
                    </div>
                    <div class="tabs" id="detail-tabs">
                        <button class="tab active" data-tab="overview">Overview</button>
                        <button class="tab" data-tab="signals">Signals</button>
                        <button class="tab" data-tab="trades">Trades</button>
                        <button class="tab" data-tab="backtests">Backtests</button>
                        <button class="tab" data-tab="alerts">Alerts</button>
                        <button class="tab" data-tab="settings">Settings</button>
                    </div>
                    <div id="tab-overview" class="tab-pane active"></div>
                    <div id="tab-signals" class="tab-pane"></div>
                    <div id="tab-trades" class="tab-pane"></div>
                    <div id="tab-backtests" class="tab-pane"></div>
                    <div id="tab-alerts" class="tab-pane"></div>
                    <div id="tab-settings" class="tab-pane"></div>
                </div>

                <div class="card">
                    <div class="card-head">
                        <h2>Activity Log</h2>
                        <div class="card-actions">
                            <button class="btn-sm" onclick="copyLogs()">Copy</button>
                            <button class="btn-sm" onclick="clearConsole()">Clear</button>
                        </div>
                    </div>
                    <div class="log-area" id="console">
                        <div class="log-line info">Dashboard initialized...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>window.API_KEY = "{{ api_key }}";</script>
    <script src="/static/app.js"></script>
</body>
</html>
